<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>finderfound // home</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600&display=swap" rel="stylesheet" />
</head>

<body class="ff-body">

  <!-- HERO -->
  <section class="ff-landing-hero">
    <div class="ff-landing-inner">

      <img src="assets/logo/finderfoundJOY.png" class="ff-landing-logo" alt="finderfound logo">

      <h1 class="ff-landing-title">
        finderfound  
        <span class="ff-accent">creative universe</span>
      </h1>

      <p class="ff-landing-sub">
        art • music • ordinals • cats • curiosity  
      </p>

      <!-- SOCIAL BUTTONS -->
      <div class="ff-social-row">
        <a class="ff-social-btn" href="https://instagram.com/finderfound" target="_blank">Instagram</a>
        <a class="ff-social-btn" href="https://x.com/finderfound" target="_blank">X / Twitter</a>
        <a class="ff-social-btn" href="https://youtube.com/finderfound" target="_blank">YouTube</a>
        <a class="ff-social-btn" href="https://linktr.ee/Finderfound" target="_blank">Linktree</a>
      </div>

      <!-- MAIN ACTIONS -->
      <div class="ff-landing-actions">
        <a href="art.html" class="ff-btn ff-primary">enter the art universe</a>
      </div>

    </div>

    <!-- CAT SPRITES (animated via JS) -->
    <img id="lunaSprite" class="ff-cat-sprite" src="assets/mascots/LUNATOONTEEPEE.jpg" alt="Luna sprite">
    <img id="midnightSprite" class="ff-cat-sprite" src="assets/mascots/MIDNIGHTTOONTEEPEE.jpg" alt="Midnight sprite">

    <!-- Yarn ball (click to activate chase mode) -->
    <img id="yarnBall" class="ff-yarn" src="assets/sprites/yarnball.png" alt="yarn ball">

  </section>

  <script>
    /* -----------------------------
       CAT SPRITE MOVEMENT + YARN MODE
       ----------------------------- */

    const luna = document.getElementById("lunaSprite");
    const midnight = document.getElementById("midnightSprite");
    const yarn = document.getElementById("yarnBall");

    let chaseMode = false;

    // Cursor tracking
    document.addEventListener("mousemove", (e) => {
      if (!chaseMode) return;

      const x = e.clientX;
      const y = e.clientY;

      // Luna moves slightly slower
      luna.style.transform = `translate(${x * 0.7}px, ${y * 0.7}px)`;

      // Midnight moves faster
      midnight.style.transform = `translate(${x * 0.9}px, ${y * 0.9}px)`;
    });

    // Toggle chase mode when clicking the yarn ball
    yarn.addEventListener("click", () => {
      chaseMode = !chaseMode;

      if (chaseMode) {
        document.body.style.cursor = "url('assets/sprites/yarnball.png'), auto";
        yarn.classList.add("ff-yarn-active");
      } else {
        document.body.style.cursor = "default";
        yarn.classList.remove("ff-yarn-active");
        luna.style.transform = "";
        midnight.style.transform = "";
      }
    });
  </script>

</body>
</html>
