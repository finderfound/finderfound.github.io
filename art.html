<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>finderfound // art universe</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
</head>

<body class="ff-body">

  <!-- HEADER -->
  <header class="site-header">
    <div class="logo">
      <span class="logo-mark">✦</span>
      <span class="logo-text">finderfound</span>
    </div>
    <nav class="nav">
      <a href="index.html">home</a>
      <a href="art.html">art</a>
    </nav>
  </header>

  <!-- IMMERSIVE ART GALLERY -->
  <section class="ff-art-immersive">
    <div class="ff-art-grid">

      <!-- GALLERY ITEM -->
      <a href="#" class="ff-art-item">
        <img src="assets/art/placeholder1.png" alt="">
        <div class="ff-art-hidden">
          <h3>Title Placeholder</h3>
          <p>Description placeholder</p>
        </div>
      </a>

      <a href="#" class="ff-art-item">
        <img src="assets/art/placeholder2.png" alt="">
        <div class="ff-art-hidden">
          <h3>Title Placeholder</h3>
          <p>Description placeholder</p>
        </div>
      </a>

      <a href="#" class="ff-art-item">
        <img src="assets/art/placeholder3.png" alt="">
        <div class="ff-art-hidden">
          <h3>Title Placeholder</h3>
          <p>Description placeholder</p>
        </div>
      </a>

    </div>
  </section>

  <!-- CATS + TOGGLES + YARN -->
  <div id="soundToggle" class="ff-sound-toggle">🔊 Sound On</div>
  <div id="nightToggle" class="ff-night-toggle">🌙 Night Off</div>

  <div id="lunaSprite" class="ff-cat-sprite ff-cat-luna"></div>
  <div id="midnightSprite" class="ff-cat-sprite ff-cat-midnight"></div>

  <img id="yarnBall" class="ff-yarn" src="assets/sprites/yarnball.png" alt="yarn ball">

  <script src="cats.js"></script>
</body>
</html>
