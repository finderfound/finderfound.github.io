<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>finderfound // art universe</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet" />
</head>

<body class="ff-body">

  <!-- HEADER -->
  <header class="site-header">
    <div class="logo">
      <span class="logo-mark">✦</span>
      <span class="logo-text">finderfound</span>
    </div>
    <nav class="nav">
      <a href="index.html">home</a>
      <a href="art.html">art</a>
    </nav>
  </header>

  <!-- ART UNIVERSE -->
  <section class="ff-art-immersive">
    <h1>Art <span class="ff-accent">Universe</span></h1>
    <p>Digital artifacts, onchain experiments, generative pieces, and explorations in curiosity.</p>

    <div class="ff-art-grid">
      <!-- Replace these with your real artwork links & images -->
      <a href="https://instagram.com/finderfound" class="ff-art-item" target="_blank" rel="noopener">
        <img src="assets/art/placeholder1.png" alt="Artwork 1 — click for more on Instagram">
      </a>
      <a href="https://x.com/finderfound" class="ff-art-item" target="_blank" rel="noopener">
        <img src="assets/art/placeholder2.png" alt="Artwork 2 — click for more on X">
      </a>
      <a href="https://youtube.com/@finderfound" class="ff-art-item" target="_blank" rel="noopener">
        <img src="assets/art/placeholder3.png" alt="Artwork 3 — click for video process">
      </a>
      
      <!-- Add more items as needed. They will auto-wrap nicely. -->
    </div>
  </section>

  <!-- Same interactive cats + controls on art page for continuity -->
  <div id="soundToggle" class="ff-sound-toggle">🔊 Sound On</div>
  <div id="nightToggle" class="ff-night-toggle">🌙 Night Off</div>

  <div id="lunaSprite" class="ff-cat-sprite ff-cat-luna" aria-label="Luna the cat sprite"></div>
  <div id="midnightSprite" class="ff-cat-sprite ff-cat-midnight" aria-label="Midnight the cat sprite"></div>

  <img id="yarnBall" class="ff-yarn" src="assets/sprites/yarnball.png" alt="Yarn ball — click to toggle chase mode">

  <script src="cats.js"></script>
</body>
</html>
